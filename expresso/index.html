<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafe Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        /* Kategori Butonları İçin Özel Ayar */
        .category-scroll { 
            display: flex;
            overflow-x: auto; 
            white-space: nowrap; 
            gap: 12px;
            padding: 15px 20px;
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; /* Firefox */
        }
        .category-scroll::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        .category-btn { 
            flex: 0 0 auto; /* Butonların sıkışmasını engeller */
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #94a3b8;
        }

        .category-btn.active { 
            background-color: #f97316; /* Turuncu */
            color: white;
            border-color: #f97316;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .item-card { 
            display: flex;
            align-items: center;
            background-color: #1e293b; 
            padding: 12px;
            border-radius: 16px; 
            border: 1px solid #334155;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .item-card:active { transform: scale(0.98); }
        
        .item-img { 
            width: 85px; 
            height: 85px; 
            border-radius: 12px; 
            object-cover: cover;
            background-color: #334155;
        }

        .price-tag { color: #fbbf24; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body class="pb-10">

    <header class="pt-10 pb-6 text-center">
        <div class="inline-block p-3 rounded-2xl bg-orange-500 mb-3 shadow-lg shadow-orange-500/20">
            <span class="text-2xl">☕</span>
        </div>
        <h1 class="text-3xl font-black tracking-tight text-white">KAREM CAFE</h1>
        <p class="text-gray-400 text-xs mt-1 tracking-[0.2em] uppercase">Dijital Menü</p>
    </header>

    <div class="sticky top-0 bg-[#0f172a]/95 backdrop-blur-md z-30 border-b border-gray-800">
        <nav id="categories" class="category-scroll">
            </nav>
    </div>

    <div id="loader" class="text-center p-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-orange-500 mx-auto"></div>
    </div>

    <main id="menu-container" class="p-4 max-w-2xl mx-auto hidden">
        </main>

    <script>
        const SHEET_ID = '2PACX-1vQStsjKaO7a8FA-hdHej5mdFoiThR8xaPT_I_x16YanCIHZ6kQSXop4Qw0-VNUHBHiIxO3Cyj20u41r';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

        let allItems = [];

        async function initMenu() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                
                const rows = csvData.split('\n').map(row => {
                    // CSV ayırma mantığını güçlendirdik (virgüllere karşı)
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                });

                const headers = rows[0];
                
                allItems = rows.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((header, i) => obj[header] = row[i]);
                    return obj;
                }).filter(item => item['Ürün Adı']);

                const categories = ['Hepsi', ...new Set(allItems.map(i => i['Kategori']))];
                
                renderCategories(categories);
                renderItems('Hepsi');

                document.getElementById('loader').style.display = 'none';
                document.getElementById('menu-container').classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = "⚠️ Veriler alınamadı.";
            }
        }

        function renderCategories(cats) {
            const nav = document.getElementById('categories');
            nav.innerHTML = cats.map(cat => `
                <button onclick="filter('${cat}')" class="category-btn ${cat === 'Hepsi' ? 'active' : ''}">${cat}</button>
            `).join('');
        }

        function renderItems(selectedCat) {
            const container = document.getElementById('menu-container');
            const filtered = selectedCat === 'Hepsi' ? allItems : allItems.filter(i => i['Kategori'] === selectedCat);
            
            container.innerHTML = filtered.map(item => `
                <div class="item-card">
                    <img src="${item['Görsel Linki'] || 'https://via.placeholder.com/150/1e293b/fff?text=...'}" class="item-img" onerror="this.src='https://via.placeholder.com/150/1e293b/fff?text=Resim'">
                    <div class="ml-4 flex-1">
                        <h3 class="font-bold text-white text-md leading-tight">${item['Ürün Adı']}</h3>
                        <p class="text-gray-400 text-xs mt-1 line-clamp-2">${item['Açıklama'] || ''}</p>
                        <div class="mt-2 flex justify-between items-center">
                            <span class="price-tag">${item['Fiyat']} TL</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            // Buton aktiflik durumunu güncelle
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            
            // Seçilen kategoriye kaydır (mobil konfor için)
            event.target.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            
            renderItems(cat);
        }

        window.onload = initMenu;
    </script>
</body>
</html>
