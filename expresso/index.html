<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafe Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; }
        .category-scroll { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-btn { @apply px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300 mr-2; }
        .category-btn.active { @apply bg-orange-500 text-white shadow-lg; }
        .category-btn:not(.active) { @apply bg-gray-800 text-gray-400 border border-gray-700; }
        .item-card { @apply flex items-center bg-gray-800 p-3 rounded-2xl border border-gray-700 shadow-md; }
        .item-img { @apply w-20 h-20 rounded-xl object-cover border border-gray-600; }
        .price-tag { @apply text-orange-400 font-bold text-lg; }
    </style>
</head>
<body class="pb-10">

    <header class="p-8 text-center bg-gray-800/50 backdrop-blur-md sticky top-0 z-20 border-b border-gray-700">
        <h1 class="text-3xl font-black tracking-tighter text-white">☕ KAFE MENÜ</h1>
        <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Hoş Geldiniz</p>
    </header>

    <nav id="categories" class="category-scroll flex p-4 sticky top-[92px] bg-gray-900/90 z-10 backdrop-blur-sm">
        </nav>

    <div id="loader" class="text-center p-10">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-orange-500 mx-auto"></div>
        <p class="mt-4 text-gray-400">Lezzetler yükleniyor...</p>
    </div>

    <main id="menu-container" class="p-4 grid gap-4 sm:grid-cols-2 max-w-4xl mx-auto hidden">
        </main>

    <script>
        const SHEET_ID = '2PACX-1vQStsjKaO7a8FA-hdHej5mdFoiThR8xaPT_I_x16YanCIHZ6kQSXop4Qw0-VNUHBHiIxO3Cyj20u41r';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

        let allItems = [];

        async function initMenu() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                
                // CSV Parsing
                const rows = csvData.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                allItems = rows.slice(1).map(row => {
                    const values = row.split(',').map(v => v.trim().replace(/"/g, ''));
                    let obj = {};
                    headers.forEach((header, i) => obj[header] = values[i]);
                    return obj;
                }).filter(item => item['Ürün Adı']);

                // Kategorileri çıkar (benzersiz olanlar)
                const categories = ['Hepsi', ...new Set(allItems.map(i => i['Kategori']))];
                
                renderCategories(categories);
                renderItems('Hepsi');

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = "⚠️ Menü yüklenemedi. Lütfen internetinizi kontrol edin.";
            }
        }

        function renderCategories(cats) {
            const nav = document.getElementById('categories');
            nav.innerHTML = cats.map(cat => `
                <button onclick="filter('${cat}')" class="category-btn ${cat === 'Hepsi' ? 'active' : ''}">${cat}</button>
            `).join('');
        }

        function renderItems(selectedCat) {
            const container = document.getElementById('menu-container');
            const filtered = selectedCat === 'Hepsi' ? allItems : allItems.filter(i => i['Kategori'] === selectedCat);
            
            container.innerHTML = filtered.map(item => `
                <div class="item-card animate-fade-in">
                    <img src="${item['Görsel Linki'] || 'https://via.placeholder.com/150/222/fff?text=Kafe'}" class="item-img" onerror="this.src='https://via.placeholder.com/150/222/fff?text=Resim+Yok'">
                    <div class="ml-4 flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-white text-lg">${item['Ürün Adı']}</h3>
                        </div>
                        <p class="text-gray-400 text-sm leading-tight mt-1">${item['Açıklama'] || ''}</p>
                        <div class="mt-2 price-tag">${item['Fiyat']} TL</div>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            renderItems(cat);
        }

        window.onload = initMenu;
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</body>
</html>
