<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expresso Cafe </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        .category-scroll { 
            display: flex;
            overflow-x: auto; 
            white-space: nowrap; 
            gap: 12px;
            padding: 15px 20px;
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .category-btn { 
            flex: 0 0 auto;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #94a3b8;
        }

        .category-btn.active { 
            background-color: #f97316;
            color: white;
            border-color: #f97316;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
        }

        .item-card { 
            display: flex;
            align-items: center;
            background-color: #1e293b; 
            padding: 14px;
            border-radius: 20px; 
            border: 1px solid #334155;
            margin-bottom: 14px;
            transition: transform 0.2s;
        }
        
        .item-img { 
            width: 80px; 
            height: 80px; 
            border-radius: 14px; 
            object-fit: cover;
            background-color: #334155;
        }

        .price-tag { color: #fbbf24; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body class="pb-10">

    <header class="pt-10 pb-6 text-center">
        <div class="inline-block p-3 rounded-2xl bg-orange-500 mb-3 shadow-lg shadow-orange-500/20">
            <span class="text-2xl">☕</span>
        </div>
        <h1 class="text-3xl font-black tracking-tight text-white uppercase">EXPRESSO CAFE</h1>
        <p class="text-gray-400 text-xs mt-1 tracking-[0.2em] uppercase font-medium">Lezzet Durağınız</p>
    </header>

    <div class="sticky top-0 bg-[#0f172a]/95 backdrop-blur-md z-30 border-b border-gray-800">
        <nav id="categories" class="category-scroll">
            </nav>
    </div>

    <div id="loader" class="text-center p-20">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-orange-500 mx-auto"></div>
    </div>

    <main id="menu-container" class="p-4 max-w-2xl mx-auto hidden">
        </main>

    <script>
        const SHEET_ID = '2PACX-1vQStsjKaO7a8FA-hdHej5mdFoiThR8xaPT_I_x16YanCIHZ6kQSXop4Qw0-VNUHBHiIxO3Cyj20u41r';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

        let allItems = [];

        async function initMenu() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                
                const rows = csvData.split('\n').map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                });

                const headers = rows[0];
                
                allItems = rows.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((header, i) => obj[header] = row[i]);
                    return obj;
                }).filter(item => item['Ürün Adı']);

                // "Hepsi" seçeneğini sildik, sadece var olan kategorileri aldık
                const categories = [...new Set(allItems.map(i => i['Kategori']))];
                
                renderCategories(categories);
                
                // İlk açılışta listenin en başındaki kategoriyi göster
                if (categories.length > 0) {
                    filter(categories[0]);
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('menu-container').classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = "⚠️ Menü şu an yüklenemiyor.";
            }
        }

        function renderCategories(cats) {
            const nav = document.getElementById('categories');
            nav.innerHTML = cats.map(cat => `
                <button onclick="filter('${cat}')" class="category-btn">${cat}</button>
            `).join('');
        }

        function renderItems(selectedCat) {
            const container = document.getElementById('menu-container');
            const filtered = allItems.filter(i => i['Kategori'] === selectedCat);
            
            container.innerHTML = filtered.map(item => `
                <div class="item-card animate-in fade-in slide-in-from-bottom-2 duration-500">
                    <img src="${item['Görsel Linki'] || 'https://via.placeholder.com/150/1e293b/fff?text=...'}" class="item-img" onerror="this.src='https://via.placeholder.com/150/1e293b/fff?text=Resim'">
                    <div class="ml-4 flex-1">
                        <h3 class="font-bold text-white text-md leading-tight">${item['Ürün Adı']}</h3>
                        <p class="text-gray-400 text-xs mt-1 line-clamp-2">${item['Açıklama'] || ''}</p>
                        <div class="mt-2">
                            <span class="price-tag">${item['Fiyat']} TL</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                if(btn.innerText === cat) {
                    btn.classList.add('active');
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } else {
                    btn.classList.remove('active');
                }
            });
            renderItems(cat);
        }

        window.onload = initMenu;
    </script>
</body>
</html>
